services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pm-inspect-internal

  pminspect:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      METRICS_PORT: ${METRICS_PORT:-8001}
    ports:
      - "${METRICS_PORT:-8001}:${METRICS_PORT:-8001}"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pm-inspect-internal
      - pm-project
    command: ["pminspect"]

networks:
  pm-inspect-internal:
  pm-project:
    external: true
    name: pm-project
