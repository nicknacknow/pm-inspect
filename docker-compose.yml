services:
  redis:
    image: redis:7-alpine
    container_name: pminspect-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  pminspect:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pminspect
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    command: ["pminspect", "listen"]
